<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>JWT Auth Demo</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    input { margin: 5px; padding: 8px; }
    button { padding: 8px 12px; }
    #dashboard { margin-top: 20px; color: green; }
  </style>
</head>
<body>
  <h2>Register</h2>
  <input type="text" id="reg_username" placeholder="Username">
  <input type="password" id="reg_password" placeholder="Password">
  <button onclick="register()">Register</button>

  <h2>Login</h2>
  <input type="text" id="login_username" placeholder="Username">
  <input type="password" id="login_password" placeholder="Password">
  <button onclick="login()">Login</button>

  <h2>Dashboard</h2>
  <button onclick="getDashboard()">Access Dashboard</button>
  <div id="dashboard"></div>

  <script>
    let token = null;

    // Register User
    async function register() {
      const username = document.getElementById("reg_username").value;
      const password = document.getElementById("reg_password").value;

      const res = await fetch("http://127.0.0.1:5000/register", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password })
      });

      const data = await res.json();
      alert(data.message);
    }

    // Login User (Get Token)
    async function login() {
      const username = document.getElementById("login_username").value;
      const password = document.getElementById("login_password").value;

      const res = await fetch("http://127.0.0.1:5000/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password })
      });

      const data = await res.json();
      if (data.token) {
        token = data.token;
        alert("Login successful! Token stored.");
      } else {
        alert(data.message);
      }
    }

    // Access Dashboard (Protected Route)
    async function getDashboard() {
      if (!token) {
        alert("Please login first!");
        return;
      }

      const res = await fetch("http://127.0.0.1:5000/dashboard", {
        method: "GET",
        headers: { "Authorization": "Bearer " + token }
      });

      const data = await res.json();
      document.getElementById("dashboard").innerText = data.message;
    }
  </script>
</body>
</html>
