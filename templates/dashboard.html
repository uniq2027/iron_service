<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <!-- Bootstrap CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f4f6f8;
            font-family: 'Arial', sans-serif;
        }
        .sidebar {
            height: 100vh;
            background-color: #343a40;
            color: white;
            padding: 20px;
        }
        .sidebar h2 {
            color: #ffc107;
            margin-bottom: 30px;
        }
        .sidebar a {
            color: white;
            text-decoration: none;
            display: block;
            padding: 10px 0;
            margin-bottom: 5px;
            border-radius: 5px;
        }
        .sidebar a:hover {
            background-color: #495057;
        }
        .content {
            padding: 20px;
        }
        .card {
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <div class="col-md-3 sidebar">
                <h2>Dashboard</h2>
                <a href="#">Home</a>
                <a href="#">Profile</a>
                <a href="#">Settings</a>
                <a href="#">Reports</a>
                <a href="#">Logout</a>
            </div>

            <!-- Main content -->
            <div class="col-md-9 content">
                <h1>Welcome, {{name}}!</h1>
                <p>This is your dashboard where you can monitor your data.</p>

                <div class="row mt-4">
                    <!-- Example cards -->
                    <div class="col-md-4 mb-3">
                        <div class="card p-3 text-center">
                            <h5>Total Users</h5>
                            <h2>120</h2>
                        </div>
                    </div>
                    <div class="col-md-4 mb-3">
                        <div class="card p-3 text-center">
                            <h5>New Orders</h5>
                            <h2>45</h2>
                        </div>
                    </div>
                    <div class="col-md-4 mb-3">
                        <div class="card p-3 text-center">
                            <h5>Revenue</h5>
                            <h2>$5,200</h2>
                        </div>
                    </div>
                </div>

                <div class="row mt-4">
                    <div class="col-12">
                        <div class="card p-4">
                            <h4>Recent Activity</h4>
                            <ul>
                                <li>User {{name}} registered.</li>
                                <li>Order #1023 completed.</li>
                                <li>Profile updated for Sarah.</li>
                            </ul>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>


    <!-- Bootstrap JS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
