<!-- <!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Registration Form</title>
  <style>
    /* Page layout */
    :root{
      --bg: #f4f7fb;
      --card: #ffffff;
      --accent: #4f46e5; /* indigo */
      --muted: #6b7280;
      --radius: 12px;
      --input-h: 44px;
      font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
    }
    * { box-sizing: border-box; }
    body{
      margin:0;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background:linear-gradient(180deg, var(--bg), #eef2ff 100%);
      padding:24px;
    }

    /* Card */
    .card{
      width:100%;
      max-width:540px;
      background:var(--card);
      border-radius:var(--radius);
      box-shadow: 0 6px 24px rgba(15, 23, 42, 0.08);
      padding:28px;
    }

    h1{
      margin:0 0 8px 0;
      font-size:20px;
      color:#0f172a;
    }
    p.lead{
      margin:0 0 18px 0;
      color:var(--muted);
      font-size:14px;
    }

    /* Form grid */
    form{ display:grid; gap:12px; }
    .row{ display:flex; gap:12px; }
    .col{ flex:1; min-width:0; }

    label{
      display:block;
      font-size:13px;
      color:#111827;
      margin-bottom:6px;
      font-weight:600;
    }

    input[type="text"],
    input[type="email"],
    input[type="password"],
    input[type="tel"],
    select,
    textarea{
      width:100%;
      height:var(--input-h);
      padding:8px 12px;
      border-radius:10px;
      border:1px solid #e6edf8;
      background:#fbfdff;
      outline:none;
      font-size:14px;
      color:#0b1220;
      transition:box-shadow .12s, border-color .12s;
    }
    textarea{ height:96px; padding-top:10px; resize:vertical; }

    input:focus, select:focus, textarea:focus{
      border-color: rgba(79,70,229,0.9);
      box-shadow: 0 3px 12px rgba(79,70,229,0.08);
    }

    .small{ font-size:12px; color:var(--muted); margin-top:6px; }

    /* Checkbox row */
    .checkbox-row{
      display:flex;
      align-items:center;
      gap:10px;
      margin-top:8px;
    }
    .checkbox-row input[type="checkbox"]{ width:16px; height:16px; }

    /* Button */
    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      padding:12px 16px;
      height:48px;
      border-radius:10px;
      border: none;
      cursor:pointer;
      background:linear-gradient(90deg, var(--accent), #6366f1);
      color:white;
      font-weight:600;
      font-size:15px;
      box-shadow: 0 6px 18px rgba(99,102,241,0.18);
      transition:transform .08s, box-shadow .12s, opacity .12s;
    }
    .btn:hover{ transform:translateY(-2px); }
    .btn:active{ transform:translateY(0); }

    /* Helper text / error */
    .error { color:#b91c1c; font-size:13px; }
    .hint { color:var(--muted); font-size:13px; }

    /* Responsive adjustments */
    @media (max-width:560px){
      .row { flex-direction:column; }
      .card{ padding:18px; }
    }
  </style>
</head>
<body>
  <main class="card" role="main">
    <h1>Create your account</h1>
    <p class="lead">Sign up to get access — quick and secure.</p>

    <form id="signup" action="#" method="post" novalidate>
      <div class="row">
        <div class="col">
          <label for="first">First name</label>
          <input id="first" name="first" type="text" placeholder="Asha" required />
        </div>
        <div class="col">
          <label for="last">Last name</label>
          <input id="last" name="last" type="text" placeholder="Kumar" required />
        </div>
      </div>

      <div>
        <label for="email">Email address</label>
        <input id="email" name="email" type="email" placeholder="you@example.com" required />
        <div class="hint">We'll send a confirmation to this address.</div>
      </div>

      <div class="row">
        <div class="col">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" placeholder="Create a strong password" required />
        </div>
        <div class="col">
          <label for="confirm">Confirm password</label>
          <input id="confirm" name="confirm" type="password" placeholder="Repeat password" required />
        </div>
      </div>

      <div class="row">
        <div class="col">
          <label for="phone">Phone (optional)</label>
          <input id="phone" name="phone" type="tel" placeholder="+91 98765 43210" />
        </div>
        <div class="col">
          <label for="role">Role</label>
          <select id="role" name="role" aria-label="Role">
            <option value="student">Student</option>
            <option value="teacher">Teacher</option>
            <option value="vendor">Vendor</option>
            <option value="other">Other</option>
          </select>
        </div>
      </div>

      <div>
        <label for="about">About you (optional)</label>
        <textarea id="about" name="about" placeholder="A short bio..."></textarea>
      </div>

      <div class="checkbox-row">
        <input id="terms" name="terms" type="checkbox" required />
        <label for="terms" style="margin:0;font-weight:500;">I agree to the <a href="#" tabindex="-1">terms &amp; privacy</a></label>
      </div>

      <div style="margin-top:12px;">
        <button type="submit" class="btn">Create account</button>
      </div>
    </form>
  </main>
